name: 构建并部署大健康站到阿里云OSS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 安装项目依赖
        run: pnpm install

      - name: 构建项目
        run: pnpm run build

      - name: 安装 ossutil
        run: |
          wget -q https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64 -O ossutil
          chmod +x ossutil
          sudo mv ossutil /usr/local/bin/ossutil

      - name: 配置 ossutil
        run: |
          ossutil config \
            -e oss-cn-hongkong.aliyuncs.com \
            -i "${{ secrets.OSS_ACCESS_KEY_ID }}" \
            -k "${{ secrets.OSS_ACCESS_KEY_SECRET }}"

      - name: 部署 index.html（不缓存）
        run: |
          ossutil cp dist/public/index.html oss://yiyeguizhen-web-hk/health/index.html \
            --meta "Cache-Control:no-cache, no-store, must-revalidate" -f

      - name: 部署 SPA 子路由（刷新不跳回主页）
        run: |
          for route in tracks research partner; do
            ossutil cp dist/public/index.html oss://yiyeguizhen-web-hk/health/${route}/index.html \
              --meta "Cache-Control:no-cache, no-store, must-revalidate" -f
          done

      - name: 部署 assets 静态资源（永久缓存）
        run: |
          ossutil cp dist/public/assets/ oss://yiyeguizhen-web-hk/health/assets/ \
            --meta "Cache-Control:max-age=31536000" -r -f

      - name: 部署 且酌×宝玉煮茶 联名页（baoyutea 子域）
        run: |
          ossutil cp dist/public/baoyutea/index.html oss://yiyeguizhen-web-hk/baoyutea/index.html \
            --meta "Cache-Control:no-cache, no-store, must-revalidate" -f
          echo "✅ baoyutea/index.html 部署完成"

      - name: 部署 宝玉煮茶 静态图片资源（长缓存）
        run: |
          ossutil cp dist/public/baoyutea/imgs/ oss://yiyeguizhen-web-hk/baoyutea/imgs/ \
            --meta "Cache-Control:max-age=31536000" -r -f
          echo "✅ baoyutea/imgs/ 部署完成"

      - name: 部署 宝玉煮茶 JS/CSS assets（长缓存）
        run: |
          ossutil cp dist/public/baoyutea/assets/ oss://yiyeguizhen-web-hk/baoyutea/assets/ \
            --meta "Cache-Control:max-age=31536000" -r -f
          echo "✅ baoyutea/assets/ 部署完成"
