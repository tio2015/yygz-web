name: 构建并部署到阿里云 OSS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装依赖
        run: pnpm install

      - name: 构建生产版本
        run: pnpm build

      - name: 安装 ossutil
        run: |
          curl -o ossutil https://gosspublic.alicdn.com/ossutil/v2-beta/2.0.3-beta.09261200/linux-amd64/ossutil
          chmod +x ossutil
          sudo mv ossutil /usr/local/bin/

      - name: 部署到 OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          ossutil cp dist/public/ oss://yiyeguizhen-web-hk/health/ \
            --access-key-id "$OSS_ACCESS_KEY_ID" \
            --access-key-secret "$OSS_ACCESS_KEY_SECRET" \
            --endpoint oss-cn-hongkong.aliyuncs.com \
            --recursive \
            --force

      - name: 设置 index.html 不缓存
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          ossutil update oss://yiyeguizhen-web-hk/health/index.html \
            --access-key-id "$OSS_ACCESS_KEY_ID" \
            --access-key-secret "$OSS_ACCESS_KEY_SECRET" \
            --endpoint oss-cn-hongkong.aliyuncs.com \
            --cache-control "no-cache, no-store, must-revalidate"
